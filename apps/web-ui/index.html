<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>prototype03 web-ui</title>
  </head>
  <body>
    <div id="root"></div>
    <script>
      (() => {
        const KEY = 'mempulse_ui_style_mode';
        try {
          const styleMode = String(localStorage.getItem(KEY) || '').trim().toLowerCase();
          if (styleMode === 'newspaper' || styleMode === 'modern-financial') {
            document.documentElement.setAttribute('data-ui-style', styleMode);
          }
        } catch {
          // Ignore blocked localStorage.
        }
      })();
    </script>
    <script src="/runtime-config.js"></script>
    <script type="module" src="./src/main.jsx"></script>
  </body>
</html>
